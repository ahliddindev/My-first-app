name: Build AAB
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build with Buildozer
        uses: ArtemSBulgakov/buildozer-action@v1
        with:
          command: buildozer android bundle
          workdir:.
          
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: aab
          path: bin/*.aab
